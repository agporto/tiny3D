# Build cross-platform wheels for Windows, macOS, and Linux using cibuildwheel.
# Handles manylinux compatibility and cross-compilation automatically.
# Publishes to PyPI only on tagged releases (e.g. v1.0.0).

name: Build tiny3D Wheels (cross-platform)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python (host interp for cibuildwheel driver)
        uses: actions/setup-python@v5
        with:
            python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel>=2.23.0"

      # Stagger macOS to avoid GitHub 429 when all jobs download virtualenv simultaneously
      - name: Wait to avoid GitHub rate limit (macOS)
        if: runner.os == 'Darwin'
        run: sleep 90

      - name: Build wheels (cp39 & cp312)
        run: python -m cibuildwheel python --output-dir wheelhouse
        env:
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.8"
          CIBW_BUILD: "cp39-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux*"  # Skip PyPy and musl builds
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_BUILD_LINUX: >
            dnf install -y --nogpgcheck cmake ninja-build gcc-c++ python3-devel &&
            pip install cmake ninja &&
            rm -f /project/CMakeCache.txt /project/cmake_install.cmake
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cmake ninja mkl-devel delvewheel
          CIBW_BEFORE_BUILD_MACOS: >
            pip install cmake ninja
          CIBW_ENVIRONMENT_MACOS: "TINY3D_VERBOSE=1 CMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build"
          # Enable debug output to see what's happening with extension building/copying
          CIBW_ENVIRONMENT: "TINY3D_VERBOSE=1"
          # Enable OpenMP on Windows with Intel runtime (more reliable) + Critical performance optimizations
          CIBW_ENVIRONMENT_WINDOWS: >
            TINY3D_VERBOSE=1 
            TINY3D_WITH_OPENMP_WINDOWS=1 
            CMAKE_BUILD_TYPE=Release
            CMAKE_ARGS=-DCMAKE_FIND_PACKAGE_PREFER_CONFIG=ON -DCMAKE_BUILD_TYPE=Release -DWITH_OPENMP=ON
            CMAKE_CXX_FLAGS_RELEASE="/O2 /Oi /Ot /Oy- /GT /arch:AVX2 /fp:fast /MP /LTCG"
            CMAKE_EXE_LINKER_FLAGS_RELEASE="/LTCG /OPT:REF /OPT:ICF"
            CMAKE_SHARED_LINKER_FLAGS_RELEASE="/LTCG /OPT:REF /OPT:ICF"
            CMAKE_C_COMPILER=cl
            CMAKE_CXX_COMPILER=cl
            CMAKE_GENERATOR=Ninja
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "MACOSX_DEPLOYMENT_TARGET=11.0 delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"

      - name: Test wheel install (cp39)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install --find-links wheelhouse tiny3d
          python -c "import tiny3d; print('tiny3d version:', tiny3d.__version__, 'native:', getattr(tiny3d,'_HAVE_NATIVE','undef'), 'py:', __import__('sys').version.split()[0])"
      - name: Test wheel install (cp312)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install --find-links wheelhouse tiny3d
          python -c "import tiny3d; print('tiny3d version:', tiny3d.__version__, 'native:', getattr(tiny3d,'_HAVE_NATIVE','undef'), 'py:', __import__('sys').version.split()[0])"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
